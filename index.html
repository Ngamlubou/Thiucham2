<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thiucham</title>
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
<style>
    html { touch-action: manipulation; 
user-select: none; 
  font-size: 28px; }
*, *::before, *::after {
  box-sizing: border-box;
}
body {
  font-family: Arial;
  font-size: 2.2rem;   
  line-height: 1.15; 
 padding: 3.5rem 0.75rem 12rem 0.75rem;
}
 ul {   list-style: none;
      padding: 0px;
      margin: 0px;
 }
  li {  padding: 0.65rem 0.7rem 0.65rem 0.7rem; 
  font-size: 1.9rem;
   border-bottom: 1px solid #ddd;  }
  li:hover {   background: #d1d2db 
}
.detail-head {text-align: center;
 font-size: 2.08rem;
  font-weight: 700;
}
.id { font-weight: 700;
  margin-right: 0.4rem;
}
.translation { font-style: italic;
 padding-top: 0.25rem;
 text-align: center;
font-size: 1.3rem; 
opacity: 0.9;
}
.song-meta {
  font-size: 1.3rem;
}
.lyrics {white-space: pre-line;
  margin-top: 1.3rem;
margin-bottom: 1.4rem;
font-family: Open Sans;
line-height: 1.3; 
}
.top-bar { position: fixed;
  top: 0; left: 0; right: 0;
  height: 3.3rem;  background: #ffffff;
  width: 100%;
  display: flex;
  align-items: center;
  border-bottom: 1px solid #ddd;
box-sizing: border-box;
  z-index: 1000;
}
#topLeft { min-width: 2.4rem;
  padding-left: 0.9rem;
padding-top: 0rem; 
cursor: pointer; 
}
#topRight { min-width: 2.4rem;
  padding: 0 0.9rem; 
cursor: pointer; 
}
.top-name { flex: 1;
  text-align: center;
  font-weight: 450;
  font-size: 1.5rem;
  white-space: nowrap;
  overflow: hidden;
}
#searchInput {
  position: absolute;
  left: 4.5rem;
  right: 4.5rem;
  height: 2.6rem;  font-size: 1.8rem;
 transform: translateY(-150%);
  background-color: #fff;
}
#searchInput.open {  transform: translateY(0);
}
#searchOverlay {  position: fixed;
  top: 3.2rem;
width: 100%;
  height: 50vh; background: #f0f4f9;
  border-bottom: 1px solid #ddd;
  overflow-y: auto;
   transform: translateY(-100%);
  z-index: 999;
}
#searchOverlay.open {  transform: translateY(0);
}
#sideMenu { position: fixed;
  top: 3.2rem; left: 0;
  max-height: 80vh; 
  width: 18rem; 
background: #f0f4f9;
transform: translateX(-100%);
  box-shadow: 2px 0 10px #00000033;
  transition: left 0.25s ease;
overflow-y: auto;
  z-index: 996;
}
#sideMenu.open { transform: translateX(0);
}
.side-head { padding-top: 0.8rem;
font-size: 1.3rem;
 padding-left: 1.6rem;
}
.side-item { padding: 1rem 0rem 1rem 0.75rem;
  font-size: 1.7rem;
cursor: pointer;
 border-bottom: 1px solid #ddd; }
.side-item.active { background: #ffe7ba;
  font-weight: 600;
}
#favPanel {  position: fixed;
  left: 0; right: 0;  bottom: 0;  
height: 50vh;
transform: translateX(-100%); 
  background: #f0f4f9;
box-shadow: 2px 0 10px #00000033;
 z-index: 997;
  overflow-y: auto;
overscroll-behavior: contain;
}
#favPanel.open { transform: translateX(0);
} 
#songDetail { position: fixed;
inset: 0;
display: none;
 background: #ffffff;
overflow-y: auto;
padding: 3.5rem 0.75rem 12rem 0.75rem;
overscroll-behavior: contain;
} 
.bottom-bar {  position: fixed;
  bottom: 0; left: 0; right: 0;
  width: 100%;
  height: 4rem;
  align-items: center;
box-sizing: border-box;
  display: flex; background: #ffffff;
  box-shadow: 0 -1px 6px #0000001f;
}
.bottom-item { flex: 1;
  text-align: center;
  height: 4rem;
  line-height: 4rem;
  font-size: 1.3rem; 
cursor: pointer;
border-left: 0.8px solid #000; }
.bottom-item:first-child {  border-left: none;} 
.bottom-item.active { background: #ffe7ba;
  font-weight: 600;
}
#projectionView { position: fixed;
  inset: 0;
  background: #ffffff;
  display: none;
  z-index: 1100;
overflow-y: auto;
overscroll-behavior: contain;
}
#projectionView .lyrics { min-height: 100dvh;
 display: flex;
  align-items: center; 
  padding-left: 0.85rem;
  padding-right: 0.85rem;
}
.pCloseSlide{ text-align: center; }
 .pCloseSlide:hover {  background: #ffe7ba;
}
  </style>  
</head>
<body>
<div class="top-bar">
 <div  id="topLeft" onclick="handleTopLeftClick()">☰</div>

  <div class="top-name" id="viewName"></div>

  <div  id="topRight" onclick="toggleSearch()">🔍</div>
  <input
    type="text"
    id="searchInput"
    placeholder="Search..."  />
</div>

<div id="sideMenu">
<div class="side-head"> Category </div>
<div class="side-item" onclick="openCategoryView('luisan', event)"> ▸ Luisan</div>
<div class="side-item" onclick="openCategoryView('khristen', event)"> ▸ Khristen Madui Lui</div>
<div class="side-item" onclick="favouriteBtn(event)"> ▸ Star ⭐</div>
<a class="side-item" href="https://sites.google.com/view/thiucham/content-info"  target="_blank"
  rel="noopener" > ▸ App Info</a></div>
<div id="favPanel">
<div class="pCloseSlide" onclick="closeFavouritePanel()"><u>Star ⭐</u></div> <ul id="favList"></ul></div>
<div id="searchOverlay">
  <ul id="searchResults"></ul>
</div>
<ul id="songList"></ul>
<div id="songDetail"></div>
<div id="projectionView"></div>
<script src="./Hiuna_Khomlui.js"></script>
<script src="./Luisan.js"></script>
<script src="./Khristen_Madui_Lui.js"></script>
<script src="./app.js"></script>
<div class="bottom-bar">
<div class="bottom-item" onclick="switchDataset('hiuna', event)">Hiuna Khomlui</div>
<div class="bottom-item" onclick="switchDataset('khristen', event)">Khristen Madui Lui</div>
<div class="bottom-item" onclick="switchDataset('luisan', event)">Luisan</div></div>
</body>
</html>
